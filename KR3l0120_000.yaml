body:
  text: 陶朱新録小說家類二異聞之屬提要臣等謹案陶朱新録一卷宋馬純撰純字子約自號朴遫翁單州城武人紹興中為江西漕使隆興初以太中大夫致仕居越之陶朱鄉搜輯見聞著是書因名曰陶朱新録純事蹟不槩見惟㑹稽志載其題能仁寺壁一詩以譏僧宗昻有黃紙除書猶到汝定知清世不遺賢之句為當時傳誦是書自宋以來史志及各家書目亦皆不著録然周輝清波雜志引其中韓南一條稱為朴􅈪翁陶朱集又稱朴􅈪翁單父人嘗宦於宣政間蓋即此書知實出宋人非後來依託也所載皆宋時雜事大抵涉於怪異者十之七八亦洪邁夷堅志之流未附元祜黨籍一碑與全書體例頗為不類考録中所記馬默思郭真人詩純蓋默之諸孫默在神宗朝以户部侍即寶文閣待制致仕奉祠後入黨籍南渡以後力反宣和之政以收人心凡黨人子孫皆從優叙故張綱華陽集中有論其除授太濫一疏然士大夫終以為榮純載是碑蓋以其祖之故亦陸游自稱元祜黨家之意云乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書陶朱新録宋馬純撰朴􅈪翁單父人也建炎初避地南渡既而宦游不偶以非材棄遂僑寄陶朱山下藜羮不糝晏然自得雖不足以語遁世無悶之道其山澤之癯乎因搜今昔見聞裒綴成帙目曰陶朱新録凡譏訕悖謾悉不録焉紹興壬戌孟夏序紹興間臨安府教授許叔微字知可真州人家世通醫常以藥施人知可既獲納薦將試之夕夢人遺詩云藥餌隂功陳樓間處殿上呼盧喝六作五莫曉所謂已而預禮部奏名廷試中第六名上名陳祖言下名樓材俄以文理優長升作第五果符所夢唱名日殿上𫝊呼謂之臚𫝊故云呼盧借為臚也吕吉甫知維揚日有吕川者賣詩於市句有可採者常與吉甫賡和有贈吉甫姪注少卿詩注好道清修之士也詩云峨眉月浸千秋雪太華峰搖十丈蓮一見升平玉清客雪蓮聲價頓銷然又有贈致仕郭朝儀詩云漫道任公釣有神六鼇無跡海生塵爭如靜卧南窗下蘭菊從教秋與春有人題詩于太行山石壁上或以為仙云太行千里連芳草獨酌一杯天地小醉卧花間人不知黃鶯啼破春山曉王將眀作館職時夢隨一道人行山間長松夾徑松根有故竈遺址俄至一室塵埃盈尺壁上挂一拄杖僧笠道人拂壁間塵有詩云白髮髙僧苦愛山一瓶一鉢老山間只因窺井動一念從此松根丹竈閒道人曰此汝昔所居也將眀意欲留曰未可遂覺决日館中曝書偶取一小說其間記婦人窺井生子事話其夢于衆靖康間京城破有賈舍人者甚儒雅無金帛子女之畜嘗題一絶于壁云愁見干戈起四溟恨無才術濟生靈不如痛飲中山酒直到太平方始醒內侍童師敏貫之養子也為太師蔡京府承受每有奏請傳達御前政和六年春師敏從駕過延福宴飲是日不果到府第以狀申白京京以絶句答之云聞說羣花爛漫開知君醉賞不能來臨風對酒空惆悵不得相從把一杯後十餘日上召輔臣曲宴焉蔡京作相大觀間因賀雪賜宴于京第庖者殺鵪子千餘是夕京夢羣鵪遺以詩曰啄君一粒粟為君羮內肉所殺知幾多下筯嫌不足不惜充君庖生死如轉轂勸君慎勿食禍福相倚伏京由是不復食史徽東美大觀間題南京道河亭上云穀雨初晴緑漲溝落花流水共浮浮東風莫掃榆錢去為買殘春更少留靖康間京畿士人往往南竄鄧州南陽縣驛有女子字書清婉留題于壁云流落南來自可嗟避人不敢御鉛華却思當日鶯鶯事獨立東風霧鬢斜張彧字景安文潜之子也俊邁有家聲一日赴調得蔡州𣙜山市易務方欲出京當宣和間景龍門燈火極盛朝以道自潁昌來潜觀遇之途景安欲拜而止之曰豈非小字僧哥者乎曰是也乃邀登酒樓飲酣贈以詩曰璧水衣冠眀玉雪市樓風月話江湖莫學羣兒敗家法入門無不曳長裾景安建炎中為陜府教授吏部侍郎陳彥修有侍姬曰小姐氣羸多病所服率鐘乳丹砂睡則多異夢於園囿游處動作别是一塵寰也多向骨肉言之醫者引神農書云臟虛多夢亦不以為異宣和間一夕夢少年挾升酒樓飲酣少年執板歌以侑酒覺猶記云人生開口笑難逢富貴榮華總是空惟有隋堤千樹栁滔滔依舊水流東姬後生子名章為廣南郡倅張乖崖與傅逸人有舊誘之仕傅曰前已是相許也遂止開寶中張與傅會于韓城終夕談話諸鄰病瘧者皆不發故乖崖公有詩云每憶家園樂名賢共里閭劇談袪夜瘧幽夢得鄉書漸長性情懶隔年音信疏終嫌纍髙節不得薦相如傅每發家書必先夢故云又豫外祖母文氏潞公之女也凡見潞公花押必剪收云能愈痁疾也黃定者於紹聖間有以牛目司馬溫公者因作寃牛文曰華州村民往嵗有耕山者日晡疲甚遂枕犁而卧乳虎翳林間怒髭搖尾張勢作威欲噉而食之屢前牛輒以身立其人之體上左右以角抵虎甚力虎不得食垂涎至地而去其人則熟寢未之知也虎行已逺牛且未離其體人則覺而惡之意以為妖因杖牛牛不能言而奔輒自逐之盡怒而得愈見怪焉歸而殺之解其體食其肉而不悔夫牛有功而見殺盡力於不見知之地死而不能以自眀向使其人早覺而悟虎之害己則牛知免而獲德矣惟牛出身捍虎於其人未覺之前此所以功立而身斃嗚呼觀此可以見矣天下之害甚於翳虎忠臣之功力於一牛嫌疑之猜過於伏體不悟之心深於熟寐茍人主莫或察焉則忠義之恨何所自别哉𫝊稱妾佯僵而棄酒上存主父下存主母猶不免於笞古有忠義獲罪言猶諒夫客有目牛之事親過而弔焉余聞其語感而書寃牛云又自跋云是牛也能捍虎于其人未寤之前而不能全其功於虎行既逺之後其見殺宜哉陳君嚮少年在京恱一小鬟有詩云無情今古垂楊岸客舍不禁風絮亂他年若解拂人頭只恐青青顔色換又有春色新晴詩雨過園林春半時新晴花卉弄妍姿有情紅蕊凝烟重無力青條帶露垂解后酒杯成獨酌艱難觴豆與誰攜看今盡迓回鸞仗獨恨青青嫩栁枝末句多不曉所謂時君嚮七十餘迎駕道旁蓋有所覩云嶽州有道人衣冠甚偉市人有指笑者因競入至郡郡將令當直司問狀道人援筆書曰無事乘間入洛陽便蒙州主問行藏家居北斗魁罡下劒挂南辰月角旁衆異之趨呈守守急召之已失所在文潞公為越之諸暨宰鼓樓新成書一絶于上曰挂向樓頭一任撾撾多撾少儘從他黃紬被裏貪春睡舒出頭來道放衙有不相喜者以詩達時相吕文穆公意其不事事欲中之也文穆見詩曰此人有宰相氣榜客次云候越州諸暨知縣文彥博到即時轉報文公罷官歸銓曹有人告之公不肯往見或者再三勉之而往文穆一見大喜出諸子拜之曰他日皆出陶鑄又出文靖見之曰此子他日與公同秉政後皆然解州安邑鹽池廣數舍中有大渠作畦種鹽于渠旁畦下結鹽為底厚數尺每日暮引渠水平池次日昧爽前即有大風起于池上謂之南風天欲眀風止畦水皆成鹽矣去池數步即無風但聞其聲渠水之源曰涌金泉出夏縣界有巫咸河自夏縣西南巫咸山旁谷中來此水能敗池鹽故作堤防之南風蓋無日無也西洛自天津橋東至下浮橋謂之聚寶灘多美石間得瑪瑙司馬溫公獨樂園在水南其孫楨濬井獲塊玉于其下無瑕極美蓋洛陽水南北池中皆有寶而河灘特為水蕩滌而見故得名焉蔡君謨為諫官時父母留鄉里因通家信云諫官不是穩當的差遣若緘口不言則辜負朝廷願大人勿憂也筆法徑密在其孫伸字伸道處名公題跋甚多王恩太尉自親事官出上皇時為三衙其夫人為買妾甚美恩方詣之見恩髀間雕青驚指曰此何物也恩忽自失而回謂夫人曰所買何等人必良家子遂訪之妾具言母縣主也父死貧故見鬻乃呼其母至不肯言其實又諭之曰不要爾還直顧但言之方道其事與妾同恩遂呼諸小史之未婚者令妾與母自擇配得一少年其家亦仕宦父為右職即命歸白其父具聘禮恩又以數百千為資送奩具戒其壻使善奉其妻之母焉噫恩本一卒而有士君子之行宜其貴也西施古名姬多不知所謂蓋越之蕭山諸暨之間有東施西施二村至今猶存蓋西子生於西村者也王彬燦然為豫言宣和間沿檄至金州石泉縣縣在亂山深處有異人古貌美髯皂袍韋帶游城市間暮即歸追之不可及皆莫知其甲子道人云山間如此者有十餘輩其二常出至邑中𫝊數世見之余但聞樵牧者時相遇耳又商於諸山舊𫝊多異人蓋其地靈秀而然有一山樵者嘗聞音樂聲宣和乙巳春夏間其山崩出一洞穴層級而下往往有石榻石椅之類初級有石龍首吐雜色藥圎前一石人以柈接之皆如生成第三級寬博如十許間屋大其下尚逺人未敢遽往也不知何名似在上洛縣中王繹思和𨼆于醫宣和間道教興嘗作侍宸舊姓姚號丹元子能詩東坡詩集中所謂姚丹元者是也或云數百嵗人屢易姓名周流人間豫嘗識於山陽然不見其異但云能幻術有林審禮作河南宫教其叔與思和甚密言異處甚多如鍾離吕公皆與往還一日其叔臨啓手足治命其子因思和求荆南日華先生為薦福思和乃以書令林子躬詣先生既至先生方負暄屋角即拜之不顧而入林子日親其門幾半月忽召入令具香燭肴醴之屬命黃冠設科儀如常已事夢其父曰吾今得為華陽散民其子乃辭先生歸抵京謁思和不值其家云適與一道人飲玉樓未歸乃往就見之方欲前致謝思和迎曰且喜賢尊已作華陽散民矣又欲拜之輒止令先拜席面一美髯道人道人曰只今往奉謁飲散林子歸詢其僕未嘗有人投謁也乃就枕小憩偶舉枕見下有字視之云鍾離來始知向髯道人乃鍾離公也思和間與林靈素不合而死或云為靈素所毒思和亦常先謂人曰不可住矣又須且去人有求長生術者即勉人以忠孝云自當得之或以謂謫仙人然有妻子與常人無異為醫官出入權貴之門中間亦嘗編置山陽河南監酒范伯言於豫云其先蜀人同孟昶歸朝過棧閣一女墜閣道下衆謂已死迫行無如之何後二十餘年女之昆弟有宦于蜀者過女墜處聞人云近有女子時出獨行閣道上諸范意其妹也秩滿代還果與相遇云初墜時為所乘轎左右護藉之至地偶得不死食草木根苗渴飲澗水間即兀坐念何當得出積思精専久之不覺隨念身已登棧道矣自後意有所往身輒飛至兄弟欲與之歸云此間甚樂不願歸也欲强邀之忽望逺峰飛去遂不見郭行字思誠不知何許人自云舉進士不第遂學道不食唯飲酒先祖馬默也知鄆之項城縣日惠然見訪素昧平生一見如舊乃云與祕丞前生同𨼆華山來時先祖官祕丞也後郭死朞年有戍兵還自陜右過華隂見郭託附書并詩與先祖云汶上歡然喜再逢為言相憶白蓮峰死生決定歸真性嵗月休教改舊容漫把文章添野録奈何官爵自天鍾南山記得登臨處間却烟雲千萬重因發其墓唯杖屨而已書中云非晚復得相見先祖謂物故頗恐已而夀至八十一康健無病豈仙家所謂非晚旦暮之謂也先祖有思郭真人詩云郭也三峰秀文章似性淳汶陽初識面謂我舊相親題詩敘游𨼆於今經幾春有家歸未得西望涕沾巾又題華山圗云南山南面五千仞瀑布飛來自山頂真人言我昔曽登爭奈今生都不省華山北面始披圖萬壑千峰一一殊長記真人言向我曽登山頂看寰區鳳翔太守邵䶵仲恭信事于仙姑即于真人也其人甚異一日本司幹官湯東野沿檄自京回至鳳翔境上憩于村邸忽見一婦人攜十六七女子行于田野中𨼆約似于真人遂令虞候邀之曰未暇往見懇到鳳翔致意龍圗謂邵公也湯至府謁邵道其事邵曰真人寢于某家今數日未覺因同往視之方酣睡室中凝塵滿席又數日真人睡起邵詢以野店所見云向有木筏提舉在此如龍圖相待極厚有一女久病令某治之某告以止數年人此時不須醫俟數盡待與將去一佳處今聞數至往踐前言也又問將往何處不答自此聲益著後召赴闕不肯往宣和間羽化于陜西有大洞真經傳于世真人所行術也道藏固有但缺而不全奉議郎開封王梁末才元之弟侍母仁夀郡主靖康丁未秋自汴泛舟至京口艤舟閘內遇辛道宗下軍叛大掠城閉舟不得出而官綱塞河遂不通行老幼七十餘人皆泣盡日晡羣盜大呼于岸以金誘舟人令指骨肉所在才元舉家志誠誦大聖救苦觀世音名號及大悲神呪求哀請救次日賊登舟囊橐一空又次日賊搜掠婦女時妻女輩皆匿避船隅舟人有告之者賊刃刺隅中皆不中亦不見有人賊反棰告者以為誕而去至辰時滿船紅光䓇然須臾光中見大聖以真珠帽冠其頂謂曰我來救汝一家即𨼆不見又少頃有紅巾之士持紅色合一枚來云統制令𫝊語無驚恐視之乃辛道宗之子也午間其渠魁姓郭李人同餘賊並散官軍至仍揭榜禁其侵掠追取所失之物得百分之十乃自陳願以其餘犒軍實避禍也二渠既去繼以羊來為惠又有問勞人來凡月餘脫禍盡室安全初非親舊不知何以得此咸謂大士隂相之力才元乃鏤板廣其事勸人持號處州都監㕔白直兵士得牛肝一片破之覺有物墜刃下視之舍利滿中一一圎眀如小石子亦異矣內宫人有物故者皆殯奉先寺四時遣中使致祭嵗久立冡纍纍相望一日中使在彼方饌祭食監庖小吏假寐堂上倣佛見數尼艷粧相倚出半身於屏間驚覺即無所見乃復寐如初頃之又出且拊掌笑相語曰又睡矣小吏乃大呼起逐之忽失所在但躡袈裟斷落一角在地即非夢也雖異之亦不甚畏蓋其處素多怪人以為常至暮又出一黑手于幕下取所割肉屑而去庖人大驚喧呼久之乃定翌日視幕外有遺肉因跡之入院後一土室而盡募人入其中有一物卧地上人形枯黑如臘遽命舁出乃一婦人喘喘然尚有生意手猶持肉屑徐哺之以粥飲經宿始能語云我院中林家婦夜為人引至此不知嵗月久近每餒即出取食亦不覺身之去來也遂訪之寺前果有民家云失婦已數年不知其鬼誘去即送回家月餘方死通判監酒趙詩者昔在學校嘗因祭丁熟寐衆與戲以香燭花果楮鏹之類設供於卧榻前而潜伺之寢者既覺見之曰我已死耶噓唏不已少頃復寐久不復起視之真死矣乃撤供設之物竟不敢言其所以於人豈乍覺見此驚散神魂遂不復還幹也耶事有不可知者伊陽深山中有黑松山平髙四十里其上皆大松有二株尤大一號大將軍一號小將軍大者圍絹三匹小者圍一匹木客取材于此者皆祭之以絹圍訖造幡挂其上政和間求眀堂柱而邑官以無中程者聞既而有人告發云大松不可出小松可取也乃命告者以官而令佐皆謫已伐之亦不可出告者尋死今獨大將軍尚在而小者委於山間惜哉崇寧間單州之成武民屠牝豕得物于豕腹破之乃象也大觀間家府君監杭之商稅院攝職官行縣至昌化聞邑人云頃年山中居民一夕聞虎鬭聲中夜忽大吼數聲遂寂然及曉視之見二虎頭八蹄而已疑其方鬭别有猛獸遇而兩食之後數年果有人見異獸於山中金毛五色如所畫獅子是必食虎者也竟不知其獸之為何名也劉豫改奉符縣為泰安軍近縣數處神祠忽傳請藥輒得病者折空紙于案上焚香祈拜起視之必有藥服者尋愈任輔之公弼時宰奉符驗之不謬如是半月餘方止大觀間有龍起于錢唐龍山石橋下天宇澄霽萬目共覩方起時以後足挈一巨石俱升至半空跳玩一食久忽委石竟去巡檢者亦出觀適至庭下會石墜遂震死之紹興九年四月會稽報恩廣孝寺浮圗災先是有童行為軍中掠為兵已而逃歸因留灑掃塔下一日聞其上恟恟之聲登塔視之復聞在上厯數級顧視其下火已起矣計窮乃仰穿至天門登相輪而火漸迫益急仰見一朱衣人鐵冠赤面黃髯立其杪遂哀祈之朱衣人俯曰閉目抱相輪大呼三聲即免如其言聲絶而塔心木坼相輪墜擲其人于旁舍屋背上雖瞢然如醉而略無傷時救火兵民皆聞塔上有呼聲一兵官坐胡牀監護于其下偶起直胡牀兵士適至而值相輪落碎首而死次日相輪猶熱甚不可向近而逃兵抱持之初無所損非物隂相能無傷乎紹興己酉永嘉災前數日有熊自楠溪至江滸躍入小舟渡至城下初不懼人命獵士殺之時髙開府世則寓城中謂其倅趙元蹈曰熊於字為能火郡中宜慎火趙笑不以為然果延燒居民舍十七八獨州治存焉永嘉瑞安縣南有大江闊與錢唐相埒去海門甚近土人云昔年大雨中有二龍一青一白鬭於波中涌浪如山鬬不已雨益甚水大漲民甚恐忽見一金龍自海門來其大數倍二龍望見皆遁金龍至江心亦沒于水雨乃止風浪息民始安漢州舉子王文昌政和間在鄉里讀書於南禪寺後山有古木甚巨其中𨼆𨼆常有笙簫聲間聞龍麝氣一日雷震樹中有白龍騰出若巨練縈紆霄漢間木尋枯死雷氏女子十餘嵗日戲庭中剎竿下一日忽于土中得新黃銅錢十餘自是日有所得幾月餘凡得錢數環他人無復獲也從伯馬伯者任青州益都尉交代乃老舉人也云初在鄉里菴居郊外一夕有盜雨中穿窬入乃謂之曰汝冒雨夜穴壁良苦度汝必不得已也盜以實告曰我非素為盜我營卒也博輸軍號不敢歸乃來相擾爾尉曰吾有絹二匹因取贈之啓戶出之盜拜謝去詰旦又詣營為請于軍校得不治其罪亦不言其為盜也次舉知交勉就試猶豫間卒義出燈下尉曰何復來耶盜曰某自前年蒙秀才恩惠自誓死生必相報今不幸殁於軍前知秀才欲赴舉故來遂失所在既而赴舉試前盜以所試題送出纍場皆然悉不謬果獲薦至南省亦然逮陛試卒又形見曰內中某不敢入矣秀才勉之已而登第卒又出曰若遇益都尉不可不受有數人負命者在彼至時某亦當從相助後果尉是邑到官未幾有告羣盜聚某村中尉率衆往捕會馬駿尉與㕔吏先至羣盜皆就執乃叱令遞相反縛畢而部衆方至盜驚曰向見馬後甲士百餘人某故不敢動所以束手也靖康間都尉錢景臻既捐館舍而火焚其第蔡京賜第在梁門外即閶闔門也南臨汴水北枕通衢連楹千百壯麗冠天下時籍沒入官乃借錢氏大長公主居之未幾頗見怪卓椅之屬皆白晝自行一日有栲栳厯階而上周流堂廡數匝忽舍於中堂錢氏子弟婢妾環視莫敢近遂呼小吏輩令舉之凡數人方能動其下一婦人髻子紅巾約之膏澤光潤如新沐狀衆大駭異莫測栲栳遽復自合相顧之間已失所在紹興間察判白彥行新昌山中見一大蜈蚣闊數寸長丈餘絶道登山而去從者為之留少頃方敢行平陽縣廨中多鬼出為怪鄭櫟年宰是邑好飲一日醉歸有一婢掖至中堂坐榻上因舉扇囑婢揚風凡數扇婢忽擲扇于地曰無恁地工夫言訖不見始知鬼也本欲玩人反為醉令所役而去亦可笑也僕妻姑之夫鄭參秉乂言政和中監中山府甲仗庫目擊一醫者為市人執以為盜不承忿爭至府醫者云去年以醫入山中行一十里越一嶺嶺下山川奇秀忽一猴挽驢不可却竟與之入道左山溪中無復徑路行二十許里見泉石清麗復有猴千百為羣跳擲嵓谷間至一石室有巨猴卧其中如人長察其有疾且異其事乃為視脈又內自謀曰不過傷果實耳既示之猴首肯似曉人事遂以常所用消化藥餌四五粒輒利者與之盈掬飲以澗水恐猴久必為患故多與藥因欲殺之也復令一猴送出既歸不敢再經其地意猴必死恐為羣狙所讎年餘偶至山中果一猴復來引驢察無他意遂與俱行至前石室病猴引其類自山而下見之大喜跳躍于前衆猴爭索藥所攜悉分與之至空笈病猴乃以白金數十匣衣兩袱贈之令向猴導以歸某鬻衣于市遂與市人見執實非盜也願從公皂行驗之帥異而許之至挽驢山間大呼曰猴我愈爾疾而反禍我度爾必有靈豈不能雪我耶俄一猴出初不畏人從吏與俱入府中猴啁􅑜㕔下指畫若辨理者帥大奇之即以衣銀還醫者猴亦奔而去政和初郭待制照晦之守青社其子堯咨字獻可者居東廡外書院中一日雨過地微潤乳媪忽陷足于地中足出而鞋落因俯首取之鞋稍入地乃探取之至不可及遂白獻可命數卒掘地取之望雖見終不得鞋宣和壬寅癸卯嵗每夏洛中輒有物如熊狀又如十五六小兒蓬其首往來城市間昏夜即出飛空而至號曰黑漢往往入人家婦女小兒遇者至有被㧓傷致驚癎疾民間傳以為畏故庭戶多張燈燭及設栁梃以却之豫外祖母文潞公女也時居清河目覩其怪初間如千萬小鈴聲又如百十小兒呼聲少頃庭下如張重霧即怪至燈皆暗無光又須臾怪自空下其狀如熊目光射人左右瞻顧復騰而去亦有密捕得者捶之如百糠囊以刃刺之往往反中其家人由是莫敢害河南尹范致虛遣使醮于嵩嶽乃絶先鞏縣有石炭坑相傳有炭精時出驚擾人村野畏之形如人長丈餘裸而黑因目曰黑漢洛人疑是此怪故亦謂之黑漢先祖元豐間仕廣西漕計時經交冦熙寧八年入省地作亂過屠雍州等諸郡無遺類凶焰甚酷廣人畏之相去未久又𫝊交人起兵郡遣人覘之云是交州界峒中檳榔木忽生癭漸大俄聞其中有啼聲峒丁因剖視之得一兒遂養于家及長乃一美婦人婉若神仙即獻之峒主交人求之不與於是舉兵伐峒滅之掠其女而去號曰檳榔女顔公弼存道元祐間作臨江軍新淦令俗喜擊鞠一日有木丸損且破得一水晶丸于破中儼然有真武像及龜蛇𨼆其內周旋宛轉而像不欹傾端然常正立于中親屢取觀之崇寧間東阿董熙載飲于村落醉歸墜馬卧道次馬韁持于手忽有盜盡解其衣又欲其馬方俯首取韁馬遽囓盜髻不得去逮熙載醉醒盡復取所失物馬始縱盜噫為人臣僕而不盡力於君主者曽是馬之不若也建炎間收陳州賊杜用軍於陳之鄧灣統制官曹實韓宏守統制王渙寨門中夜聞小喧徐擁一美婦出斬之行刑者語二將曰某屢斬無辜矣重自嘆息又曰適婦人自云陳之胥妻也早來王統制得之賊中欲與之通不允已刺一刀適又逼之婦人曰統制軍官也隨都統來破賊本為百姓除害若要新婦充婢使則可若欲見私所不願也王渙欲强之且曰我當殺汝婦人又曰如此統制亦賊爾一死何懼遂命斬之二將嗟嘆通夕不能寐噫保其貞潔而不懼死雖古烈女不為過也諸暨縣孝義鄉有俞判官廟祈求雨𤾉頗著靈應相𫝊其初本村落間逐什一者無家不知所自來臨死自云本天曹主雨雪判官嘗指其地曰我死當廟食于此既而六月飛雪厚數寸鄉人乃即其地建祠祀之紹興癸亥暨陽旱邑官迎其神置大雄寺建道場禱之時六月神至寺日殿前當空有片雲生須臾飛雪著瓦有聲敞扇接之良久乃消寺中寄居及僧行往往見之少頃即止然竟無雨豈天數有定不可違也內侍吳曇子雲嘗說宣和間夜直禁中與同列博忽一毛手出燈下且持燈而去視之乃巨猴共逐之即委燈失猴所在他日上直復聚博燈下戲相謂曰猴將復來乎少頃果有一物至驚逐之乃巨猴也又失所在揚州參議㕔舍其中堂每日暮有碧牡丹出地中視之如水影以足蹙之蓬蓬然散如金塵而滅前後政往往見之其宇起於兵火後疑地中有埋沒金寶但未有人決意發之爾舒亶作尉日斬弓手自劾由此知名至顯官一日獨對便殿神宗望見初入門時若更有一人影隨之上驚問其所以亶具言弓手之魂常在臣左右上令具狀進呈即印以御寶判送付冥司權放托生命亶歸密焚之已而果不復見徐州有村人獵兔見一狐毛色深紅逐之不可及又山東人捕狐以瓦籠置鴿其中狐繞之垂涎因觸網或能人言略可辨逼之乃嘷耳河隂南廣武山漢髙皇廟在其麓殿前有八角井曰漢泉井中三魚一金鱗一黑一如常半邊鱗肉與骨皆無獨其首全與二魚並游水中但其游差緩不復有揚鬛撥剌之勢觀者憑欄俯窺雖異之而猶未審一日有墮井而死者因濬之遂得三魚鱗色如在水中時半邉者五肉皆無方大異之後復置水中至今三魚尚存俗傳漢髙皇食鱠庖人治魚及半而楚人至倉皇棄魚井中而遁此語固無根難信然已刳之魚而游泳不死亦可怪也河南潁陽縣北十五里曰倚箔山山有洞若三間屋大洞中潭水深不可測人或瀆多致雷雨之變時有笙簫聞于洞中移時乃止蓋龍吟也宣和末豫官河南沿檄與縣令陳公游焉或云歐公見神清洞處紫雲傍山若倚箔然故得名而神清之字見于石壁上時有張道人居洞前茅屋中其人清瘦輕强眼頗碧色舉止若兒童大朴未散者他人居此者率不過月餘必有怪恐怖而去甚者雷雨挈置山下獨張居已三年初無所見又一僧極山野衫衣藍縷與張同處亦已數月似有行業者張云凡潭水微動須臾有雲生于水上稍出洞去即山下必雨雨止雲乃覆山有龍復歸數日前僧坐椅誦法華經于案忽潭水動但以為雨候俄一白蛇出水中其大如梁由僧之前右繞盤于左其高如椅僧張皇恐怖入室閉關潜窺間僧無如之何乃厲聲曰龍王之出必欲聞經老僧為龍王講此一品既終回施甫畢蛇由舊徑右繞入潭中後僧先去張復年餘亦不知所之張又云嘗遍走此諸山中有洞穴數十皆不知名往往有人骨積于旁一日至洞中行數十步覺地軟捫之乃行大蛇背上急奔走而出又云亦有好洞穴但深僻不可居路險常人難到蓋張登山由石壁其上如飛故能深厯也倚箔山頂有石盆側傾向日謂之快活窠邢和璞算星處也有鳥道可登游者行此道未至而張由石壁先至也亦疑其必有術但叩之唯言無能而已政和間相州每夜二鼓後有人呼于街中曰華二哥家家聞之莫測誰何有韓氏子偶宿旅舍聞其呼頃之聲稍入邸中遍厯諸舍呼過韓子乘酒戲應之其聲尋至枕邉大呼曰華二哥韓以被蒙首不敢動凡半年乃絶竟不知何怪豫家一鑊置熟鴨子數枚未食間忽聞其一作啐啐聲驚取附耳聽之如伏卵已成欲出殼者疑其煮未熟恐尚生活既剖之黃白宛然與衆無異噫豈有物使然以警殺生者乎豫親劉十七郎中家一日與客正坐一犬忽人立捧茶甌而出客大駭郎中公不以為異茶啜訖還以盞付之犬既去行數步擲盞於地而斃蓋人不怪其怪自當其禍也政和間川人楊傑朝散知齊之長清縣其家鴨卵破之得一物長寸餘如人形作男女相屈一足眉目口鼻手足腰腹悉具被髮垂頸乃臘之既枯而脅骨莖莖皆𨼆起與人無異亦怪矣密州髙密縣劉三郎者以商賈為業久之銷折殆盡因夜過一橋聞人呼其姓名曰汝善人也我借汝錢本劉問君何人曰我守此錢久矣未有人可付之又問他日當何奉還曰若遇東來生即還他日於橋下果得錢萬緡自此纍鏹甚富劉素有催生藥每施人一日自文登歸道中有孕婦臨蓐兩日不分娩頗危困與藥服之立産男翌日其人謝劉甚勤且以劉自文登來乃字其子曰東來生劉驚悟曰比者神人所告錢主也即以其錢十萬緡還之具道其事由是二家置屋居如骨肉焉宣和甲辰春三月二十一日沿江大風壞官私舟船數千艘先是有江州德化縣進士周持志宿馬當市中夜聞人語甚喧視之鬼神千百執絳紗籠而過中一人云二十一日大風當取若干人以舒邁綱綱官賴通管押旁一人目之若曰恐人聞其言也周至日抵湖口縣謁巡檢道所見衆不以為信忽催綱吏人入白有舒保義名邁不肯行舟乃召舒詢其所以亦訝其姓名與周所聞合也舒曰夜來夢神人云今日當大風要邁綱官賴通恐果有風濤之虞本住落星寺下乃遷于此因留周與舒飯未舉匕筯風大作賴通者方料理檣纜之屬失足溺死宣和間舒州司録李知雄云頃赴調寓居京師一日乘馬過舊曹門角路遇回風盤旋馬首不散俄昏然如醉時頭上席帽為風飄不知所向既歸覺憒憒不佳乃就枕夢為人召去至一官府有朱紫二人據㕔事揖李同坐紫衣者謂李曰且喜同事緋衣者舉二指曰他尚有二十年在久之李辭去紫衣又曰候喫南食著南衣於南窗下相見既覺異之後偶到曹門外泰山廟見向所失席帽挂于廟中録事堂椅子上郭堯咨獻可妻高氏日誦白傘蓋呪郭氏兵火後避地山陽一日獻可謂之曰汝誦此呪何益因戲指所畜猫曰能令此猫托生為人否高氏遂於猫前誦其呪是夜猫果死獻可以為偶然又數日捕得野猫又謂高氏曰能更使此猫為人乎髙為誦呪其猫夜亦死蔡州趙旻開肆貨鹽于江州生一女小字招兒二嵗不能語因出見寶林寺童行周法昌遽拽其衣大慟父母驚異之其女忽語曰此我前生子周伴僧也我本坊前賣煎魚周嫂年五十六以心痛而死三年不得功德在地獄中紹興五年五月二十一日天赦蒙放歸夢于其子求功德云誦太上救苦經千遍可免遂於太平觀求得其本誦之數足乃生為狗其子誦不輟至萬遍遂生于此趙旻乃鏤板廣其事以為勸云旋風中必有鬼神蓋有是理僕頃年作河南司録因行縣至澠池道中有旋風自西山來卷塵埃上干霄漢僕念俟此風近當下馬避之既而相去百餘步忽轉而之北行一里許又轉由西北絶山而去然所轉詰曲皆由徑路真其中有物眉山人程之祥朝議字單父云崇寧間蜀中大水江中流下一褐衫長二三丈為人所得先是有數獵人從禽于峨嵋山行十餘日忘路之逺近者至一處山川極雄深隔澗有長人踞坐旁一虎馴若猫犬因發弩以藥矢射之乃仆虎乃轉而去獵者欲過澗視之腥不可近即登大樹伺之須臾其輩五六人或男或女來視中箭者左右瞻視若求其讎既而扶舁以回獵人歸話于人皆莫知之至是始驗其不妄深山窮谷固有異物也茅山蔣景徹先生云大觀間有湯法師道童年十二三偶戲于高居洞前掬流水見丹一粒若朱櫻自洞中流出因掬水併咽之忽覺丹自臍中飛去自此亦不食父母聞之以為病取歸强以肉食入口即嘔噦乃强食七竅流血香馥無腥穢氣血絶趺坐而終湯聞之嘆息曰父母愚甚賊此子也知江寧縣葉義問字審言前任錢唐知縣日適當兵火擾攘之後有訴百姓十三人殺其家老幼七口劫取財物縣中捕之盡獲其賊未至縣治中偶三人已死九人皆伏罪一人不承甚力葉念十二人既已伏辜此一人亦可憫也私欲出之是夕夢一小兒云知縣所欲貸者乃是前日殺兒之人及盡見其家被害七人既覺引囚令具所殺人老幼形狀獨不具此小兒者葉乃問不承者云殺小兒者是汝何可諱耶因垂涕俯首伏罪案遂成內侍吳子雲言宣政間禁中有木犀一株雕欄漆檻封殖甚謹有中官典領之每有花落輒收取之進呈雖一枝一葉莫有敢攀折者是時如柑橘之類御苑種之皆盛今永嘉平亦用為薪物有遇不遇也大觀間李成允奉使梓夔路撫諭羣蠻泝峽江而上一日治舟岸次屬官輩縱步山間忽見桃花甚開十二月也山川秀麗殆非人世比衆方嘆異其處旁一媪謂曰虎且至宜速還俄聞虎聲乃急登舟已見虎踞于岸舟人不敢解纜斷之而行少頃方疑花發非時媪獨無懼虎色乃悟其非人豈靈仙山鬼之窟宅歟甲交先生忘其何許人國初登進士第慶厯間先祖作舉人時其子宰金鄉每詢父所在百計求得之多坐卧于屏風上動作無常竟去不知所之後寓淮陽軍館于富民周氏喜延方外士有來者先生輒極口罵之無敢留者先生飲食如常人未嘗出城而人有見于數百里外與之語者時與周氏小兒戲取壁土爇之悉成香或當其飲即以酒和土握之遂成墨異事甚多一日别之往陜右曰聞彼有人可教爾少時即回周詢之乃嘆曰我欲去矣求一人授吾道竟未有也然不以授周建炎間先生猶在濮陽一士人有婢懷孕主母怒强主父捶之解后致死乃遣僕𨽻瘞于郊外婢忽自外入謂主人曰君以我死不復能來耶遂直造舊室視其幃帳皆已撤去即求取復置如初自此雜羣婢中無異乎昔主母大怒月餘憂卒婢遂専房又經年主人亦死婢乃不見其弟因話于人鬼忽來見形欲害之其弟哀求乃云只要君肉弟先極充肥後但存皮骨蘇庠字養直詩僧癩可之兄也山居以詩酒自娛髙尚不仕紹興甲子年六七月間一道人投謁稱羅浮山長生道人江觀潮其下有詩一聨云富貴易逢日月短此中難遇是長生蘇疑其妄人亦漫出見之云本師黃真人遣我來専致丹于先生蘇以其無因益疑之乃答以與黃素昧平生不敢受丹江曰黃五代時曽知惠州後避亂入羅浮得道今數百嵗此丹當還黃真人至晚告别欲去及五更興嘆惜蘇之不遇也越宿蘇頗追悔遣人伺之江眠尚未起遂欵扉就謁且敘昨日丹事今願得之江初以其疑不欲留蘇再三遜謝方出丹授之并教服餌法仍戒謹藏恐為鬼神所竊云服此丹當延夀一紀臨行又云若即服不見功不若俟有緩急然後服蘇雖得藥終疑之有詢者但云其事渺茫及嵗暮忽苦痰疾藥皆不能下遂委頓悶絶衆醫束手請治後事諸子乃議投以道人所留丹入口即蘇次日下黑汁一缶自是遂安方追感黃真人之事命其子入城訪畫史出意圗其像將奉香火月餘得之與送丹江道人酷相肖無小異懸于净室朝夕焚香禮拜不少倦如是年餘一日忽有一道人至庠適他出道人留書一卷屬其子俟庠歸授之飄然而去庠歸啓視乃服氣錬形之訣自此閉户潜修深得金丹大㫖後雲逰峨嵋不知所終王樂道之子名襄字幼安少年時居頴昌一日初春與數客奕于天慶觀有二道人攜籃坐閣上指幼安相謂曰唯此人差得須臾取一瓜于籃中分食之而坐客皆不平其竊議謂觀主曰適二人何者敢議吾曹觀主指一小房答曰一人寓此月餘彼一人不識也幼安徐曰未必非異人今正月也安得有瓜果乎衆方驚訝因往觀視閣邉猶有棄瓜子在地自此日往伺之竟不復至時幼安以父䕃承務郎果為資政殿學士判西洛也龍泉宰河陽楊仲京字德先云崇寧丙戌冬夜半忽聞滿街悲號聲甚哀窺之見羣狐百餘悲鳴奔突由南門而出眀年秋大水汴渠溢逆流橫潰河隂被浸至宣和乙巳冬狐復如是邑人皆憂水患眀年金人渡河宣和元年秋畿內大水中外皆具舟楫城中往往訛言水至宣和末僕在河南司録時密縣再自鄭州割𨽻河南府沿檄宿縣境之超化寺寺在山間四面皆水其地坎深一尺即水湧出蓋寺基似浮于上阿育王舍利塔之一也寺僧云比日京城大水其源自北去前數日先聞塔下地中風雷聲雨如霪水即大出橫流滿野滔滔東去直抵京城蓋兵之象也後果有圍城之兆有士人買妾既而卧病汪彥章以詩戲之其一曰但知瓊樹鬬清新不道三彭接有神處仲未聞開閣事維摩空對問禪人封侯燕頷何妨瘦伐性蛾眉却怕顰從此空花掃除盡定須嚼蠟向橫陳又曰溫柔鄉裏事還新便擬尊前賦洛神定向中年多作惡非干尤物解移人莫愁阿騖煩君嫁且學西施為我顰爭似儂家無一事從來婚嫁只朱陳王安中履道任大名監倉日喜營妓路瑩嘗贈詞書泥金領巾上後安中宣和間作燕山宣撫使取途大名路瑩乃迎于道左安中因作玉樓春云飛鴻只解來箏柱終寄青樓書不去手因春夢有攜時眼到花梢無著處泥金小字回文句翠袖紅裙今在否欲尋楚館舊時雲看取髙唐臺畔路嘉王榜王昴作狀元始婚禮夕婦家立需催粧詞昴走筆賦好事近云喜氣擁門闌光動綺羅香陌行到紫薇花下悟身非凡客不須朱粉汙天真嫌怕太紅白留取黛眉淺處畫章臺春色元祐黨籍凡三著僕家舊有元祐姦黨碑建炎間吕元直作相取去最後者也其間多是元符間臣僚文曰皇帝嗣位之五年旌别淑慝眀信賞刑黜元祐害政之人靡有佚罰乃命有司夷考罪狀第其首惡與其附麗者以聞得三百九人皇帝書而列之石置於文德殿門之東壁永為萬世臣子之戒又詔臣京書之將以頒之天下臣竊惟陛下仁聖英武遵制揚功彰善疸惡以昭先烈臣敢不對揚休命仰承陛下繼述之志司空尚書左僕射兼門下侍郎臣蔡京謹書元祐姦黨文臣曽任執政官二十七人司馬光文彥博吕公著吕大防劉摰范純仁韓忠彥曽布王巖叟梁燾蘇轍王存鄭雍傅堯俞趙瞻韓維孫固范百祿胡宗愈安燾李清臣劉奉世范純禮陸佃並元祐黃履張商英蔣之竒元符曽任待制以上官四十九人蘇軾劉安世范祖禹朱光庭姚勔趙君錫孔文仲孔武仲吳安持馬默錢協李之純鮮于侁趙彥若孫覺趙卨王欽臣孫升李周王份韓川顧臨賈易吕希純曽肇王覿范純粹吕陶王古豐稷張舜民張問楊畏陳次升鄒浩謝文瓘並元祐岑象求周鼎路昌衡徐績董敦逸上官均郭知章楊康國葉濤龔原朱紱葉祖洽朱師服並元符餘官一百七十七人秦國黃庭堅朝補之吳安詩張耒歐陽棐劉唐老王鞏吕希哲杜純張保源孔平仲司馬康宋保國湯彧黃𨼆畢仲游常安民汪衍余爽鄭俠常立程頥唐義問余卜李格非陳瓘任伯雨張庭堅馬㳙孫諤陳郛朱光裔蘇嘉龔夫王回吕希續吳儔歐陽中立並元祐尹材葉仲李茂直吳處厚商倚李績中陳祐虞防李祉李深李之儀范正平曹蓋楊琳蘇􅀢葛茂宗劉渭柴衮洪羽李新趙天佐衡鈞衮公適馮伯樂周誼孫琮范彚中鄧考甫王察趙峋封覺民胡端修李傑李貫石芳趙令畤郭執中金極高公應張集安信之黃策吳安遜周永徽高漸張夙鮮于綽吕諒卿王貫朱紘吳眀梁安國王古蘇逈檀固何大受王針鹿敏求江公望曽紆高士育鄧忠臣种師極韓浩郁貺秦希甫錢景祥周綍何大正梁寬吕彥祖沈千曹興宗羅鼎臣劉勃王極黃安期陳師錫于肇黃遷黃俠正許堯甫楊朏梅君俞胡良寇宗顔張居李修逢純熙黃才高道恪曹與侯顧道周遵道林膚葛輝宋夀巖王公彥王交張溥許安修劉吉甫胡潜楊懷寶董祥倪直孺蔣津王守劉元中王陽梁俊民張裕陸表民葉世英謝潜陳唐劉經國扈充張恕陳并洪芻周諤蕭刓趙越滕友江詢方適許端卿李昭玘向訓陳察鐘正甫高茂華楊彥璋彭醇廖正一李夷行梁士能並元符武臣二十五人張巽李備王獻可胡田馬田馬稔王履趙希夷郭子旗任璿錢盛趙希德王長民李永李愚王庭臣吉師雄吳休復崔昌符潘滋高士權李嘉亮李玩劉延肇姚雄李基並元符內臣二十九人梁惟簡陳衍張士良梁知新李綽談扆竇鉞趙約黃卿從馮說魯燾蘇舜民楊稱梁弼陳恂張茂則張琳裴彥臣李稱王紱閻守勤李穆蔡克眀王化基王道鄧世昌鄭居簡張祐王化臣並元祐為臣不忠二人王圭元祐章惇元符右今准尚書兵部符備降敕命㫖揮立石監司㕔崇寧四年二月日此兩浙常平司所立碑時天下監司郡守皆立之後星變遂毁陶朱新録
